name: Safe Deploy to Hostinger

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  web-deploy:
    name: Deploy
    runs-on: ubuntu-latest
    steps:
    - name: 🚚 Get latest code
      uses: actions/checkout@v4

    - name: 🧪 Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: 🔨 Build Project
      env:
        VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
        VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        VITE_GEMINI_API_KEY: ${{ secrets.VITE_GEMINI_API_KEY }}
      run: |
        npm install --legacy-peer-deps
        npm run build
        
        # Copy routing and server files to the built folder
        cp .htaccess dist/
        cp index.js dist/
        cp package.json dist/
        cp package-lock.json dist/



    
    - name: 🚀 Sync Files (Safe Mode)
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        local-dir: ./dist/
        server-dir: ./public_html/
        # EXCLUDE UNWANTED FILES - Final Clean State for Vite Setting
        exclude: |
          **/node_modules/**

        # This ensures it only updates/adds files and doesn't wipe unknown server folders
        dangerous-clean-slate: false
