name: Safe Deploy to Hostinger

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  web-deploy:
    name: Deploy
    runs-on: ubuntu-latest
    steps:
    - name: 🚚 Get latest code
      uses: actions/checkout@v4

    - name: 🧪 Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: 🔨 Build Project
      run: |
        npm install --legacy-peer-deps
        npm run build
        # Move build files to root for Hostinger's "React" framework compatibility
        cp -r dist/* ./

    - name: 🚀 Sync Files (Safe Mode)
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        local-dir: ./
        server-dir: ./
        # CRITICAL: Do NOT delete the Products folder on the server
        exclude: |
          **/node_modules/**
          **/Products/**
          .git*
          .git/**
          **/*.map
          *.zip
          *.ts
          package-lock.json
        # This ensures it only updates/adds files and doesn't wipe unknown server folders
        dangerous-clean-slate: false
